services:
  - type: web
    name: logic
    runtime: node
    autoDeploy: true
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Stripe
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_MONTHLY
        sync: false
      - key: STRIPE_PRICE_YEARLY
        sync: false
      - key: STRIPE_PRICE_BASIC_MONTHLY
        sync: false
      - key: STRIPE_PRICE_BASIC_YEARLY
        sync: false
      - key: STRIPE_PRICE_STANDARD_MONTHLY
        sync: false
      - key: STRIPE_PRICE_STANDARD_YEARLY
        sync: false
      - key: STRIPE_PRICE_PREMIUM_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PREMIUM_YEARLY
        sync: false
      - key: STRIPE_PRICE_BETA_CAMPAIGN
        sync: false
      # Report problem: email
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: REPORT_EMAIL_TO
        value: keita.urano2@gmail.com
      # Report problem: Jira
      - key: JIRA_URL
        value: https://logic.atlassian.net
      - key: JIRA_EMAIL
        value: keita.urano@gmail.com
      - key: JIRA_API_TOKEN
        sync: false
      - key: JIRA_PROJECT_KEY
        value: SCRUM
      # Admin override
      - key: ADMIN_SECRET
        sync: false
      # AI
      - key: ANTHROPIC_API_KEY
        sync: false
      # Frontend env (Vite build time)
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_API_BASE
        sync: false
