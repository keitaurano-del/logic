<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#1A1F2E"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C8EF5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6C8EF5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Central symbol: Logic tree/pyramid -->
  <g transform="translate(256, 180)">
    <!-- Top node -->
    <circle cx="0" cy="0" r="30" fill="url(#grad1)"/>
    
    <!-- Left branch -->
    <line x1="-20" y1="25" x2="-80" y2="100" stroke="url(#grad1)" stroke-width="4"/>
    <circle cx="-80" cy="120" r="22" fill="#6C8EF5" opacity="0.8"/>
    
    <!-- Right branch -->
    <line x1="20" y1="25" x2="80" y2="100" stroke="url(#grad1)" stroke-width="4"/>
    <circle cx="80" cy="120" r="22" fill="#6C8EF5" opacity="0.8"/>
    
    <!-- Center bottom -->
    <line x1="0" y1="30" x2="0" y2="100" stroke="url(#grad1)" stroke-width="4"/>
    <circle cx="0" cy="120" r="22" fill="#6C8EF5" opacity="0.8"/>
  </g>
  
  <!-- Text: LOGIC -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="56" font-weight="bold" text-anchor="middle" fill="#6C8EF5">
    Logic
  </text>
</svg>
