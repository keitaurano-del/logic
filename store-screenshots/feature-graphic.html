<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1024px;
    height: 500px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #3B5BDB 0%, #5B7BF7 40%, #7B9BFF 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Decorative circles */
  .circle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.1;
    background: white;
  }
  .c1 { width: 300px; height: 300px; top: -80px; right: -60px; }
  .c2 { width: 200px; height: 200px; bottom: -60px; left: -40px; }
  .c3 { width: 150px; height: 150px; top: 50%; left: 45%; transform: translate(-50%, -50%); opacity: 0.06; }

  .content {
    display: flex;
    align-items: center;
    gap: 60px;
    padding: 0 80px;
    z-index: 1;
  }

  .text-section {
    flex: 1;
    color: white;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
  }

  .logo-icon {
    width: 56px;
    height: 56px;
    background: white;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 900;
    color: #3B5BDB;
    letter-spacing: -2px;
  }

  .logo-text {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -1px;
  }

  .tagline {
    font-size: 32px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 16px;
    letter-spacing: -0.5px;
  }

  .sub {
    font-size: 16px;
    opacity: 0.85;
    line-height: 1.6;
  }

  .badges {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .badge {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.3);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    color: white;
    font-weight: 600;
  }

  .phone-mockup {
    position: relative;
    width: 220px;
    height: 420px;
    flex-shrink: 0;
  }

  .phone-frame {
    width: 220px;
    height: 420px;
    background: #1C1917;
    border-radius: 30px;
    padding: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    border-radius: 22px;
    overflow: hidden;
    background: #F5F1E8;
  }

  .phone-screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
  }

  .notch {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 24px;
    background: #1C1917;
    border-radius: 0 0 14px 14px;
    z-index: 2;
  }
</style>
</head>
<body>
  <div class="circle c1"></div>
  <div class="circle c2"></div>
  <div class="circle c3"></div>

  <div class="content">
    <div class="text-section">
      <div class="logo-row">
        <div class="logo-icon">Φ</div>
        <div class="logo-text">Logic</div>
      </div>
      <div class="tagline">論理思考を<br>毎日3分から。</div>
      <div class="sub">フェルミ推定・ケース面接・ロジカルシンキングを<br>AIと一緒に実践トレーニング。</div>
      <div class="badges">
        <span class="badge">AI対話型</span>
        <span class="badge">34レッスン</span>
        <span class="badge">ロールプレイ</span>
      </div>
    </div>
    <div class="phone-mockup">
      <div class="notch"></div>
      <div class="phone-frame">
        <div class="phone-screen">
          <img src="01_home.png" alt="Logic App Home Screen">
        </div>
      </div>
    </div>
  </div>
</body>
</html>
