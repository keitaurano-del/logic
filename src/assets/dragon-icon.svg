<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1B3D"/>
      <stop offset="100%" stop-color="#1A1040"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#4B8AFF"/>
      <stop offset="50%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#3D1D8E"/>
    </linearGradient>
    <linearGradient id="wing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6C5CE7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2D1B69" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="horn" x1="0" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#8B9CF7"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#4B8AFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6C5CE7" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#4B8AFF" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="96" fill="url(#glow)"/>

  <!-- Wings -->
  <path d="M36 88 Q12 48 28 28 Q38 18 52 32 Q58 40 56 52 Q54 64 48 72 L56 82Z" fill="url(#wing)" filter="url(#shadow)"/>
  <path d="M164 88 Q188 48 172 28 Q162 18 148 32 Q142 40 144 52 Q146 64 152 72 L144 82Z" fill="url(#wing)" filter="url(#shadow)"/>
  <!-- Wing veins -->
  <path d="M32 38 Q42 42 50 56" stroke="#8B9CF7" stroke-width="0.8" opacity="0.4" fill="none"/>
  <path d="M168 38 Q158 42 150 56" stroke="#8B9CF7" stroke-width="0.8" opacity="0.4" fill="none"/>

  <!-- Body -->
  <path d="M70 80 Q68 62 100 54 Q132 62 130 80 Q134 108 100 124 Q66 108 70 80Z" fill="url(#body)" filter="url(#shadow)"/>
  <!-- Belly highlight -->
  <path d="M82 76 Q82 68 100 62 Q118 68 118 76 Q118 98 100 108 Q82 98 82 76Z" fill="#7B9BF7" opacity="0.15"/>

  <!-- Head -->
  <path d="M64 56 Q62 28 100 20 Q138 28 136 56 Q136 72 100 78 Q64 72 64 56Z" fill="url(#body)" filter="url(#shadow)"/>

  <!-- Horns -->
  <path d="M76 30 L64 8 L82 26" fill="url(#horn)"/>
  <path d="M124 30 L136 8 L118 26" fill="url(#horn)"/>
  <path d="M100 22 L100 6 L105 20" fill="url(#horn)"/>

  <!-- Eyes -->
  <path d="M80 46 L94 42 L94 52 L80 48Z" fill="#00E5FF"/>
  <path d="M120 46 L106 42 L106 52 L120 48Z" fill="#00E5FF"/>
  <!-- Eye glow -->
  <path d="M80 46 L94 42 L94 52 L80 48Z" fill="#fff" opacity="0.15"/>
  <path d="M120 46 L106 42 L106 52 L120 48Z" fill="#fff" opacity="0.15"/>
  <!-- Pupils -->
  <circle cx="90" cy="47" r="2" fill="#001030"/>
  <circle cx="110" cy="47" r="2" fill="#001030"/>

  <!-- Nostrils -->
  <circle cx="95" cy="62" r="1.5" fill="#2D1B69"/>
  <circle cx="105" cy="62" r="1.5" fill="#2D1B69"/>

  <!-- Arms -->
  <path d="M68 86 Q54 92 50 104 L60 98 L64 90" fill="#2D1B69"/>
  <path d="M132 86 Q146 92 150 104 L140 98 L136 90" fill="#2D1B69"/>

  <!-- Legs -->
  <path d="M80 120 L74 138 L80 134 L86 138 L84 120" fill="#2D1B69"/>
  <path d="M120 120 L116 138 L122 134 L128 138 L124 120" fill="#2D1B69"/>

  <!-- Tail -->
  <path d="M100 124 Q126 140 146 126 Q156 116 154 106" stroke="#3D1D8E" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M154 106 L160 96 L152 102 L158 92" fill="#6C5CE7"/>

  <!-- Chest scales pattern -->
  <path d="M92 82 Q100 78 108 82" stroke="#8B9CF7" stroke-width="0.6" opacity="0.3" fill="none"/>
  <path d="M90 88 Q100 84 110 88" stroke="#8B9CF7" stroke-width="0.6" opacity="0.3" fill="none"/>
  <path d="M88 94 Q100 90 112 94" stroke="#8B9CF7" stroke-width="0.6" opacity="0.3" fill="none"/>

  <!-- Sparkle effects -->
  <circle cx="46" cy="40" r="1.5" fill="#8B9CF7" opacity="0.5"/>
  <circle cx="156" cy="36" r="1.2" fill="#8B9CF7" opacity="0.4"/>
  <circle cx="38" cy="70" r="1" fill="#4B8AFF" opacity="0.3"/>
  <circle cx="162" cy="66" r="1.3" fill="#4B8AFF" opacity="0.4"/>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#4B8AFF" stroke-width="1" opacity="0.15"/>
</svg>
