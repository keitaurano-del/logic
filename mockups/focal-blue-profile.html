<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Logic — Profile (Focal Blue モックアップ)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@600;700;800;900&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:               #1A1F2E;
    --surface:          #252C40;
    --surface-high:     #2E3652;
    --surface-low:      #1E2438;
    --text:             #E8ECF4;
    --text-2:           #8FA3C8;
    --text-3:           #6B82A8;
    --primary:          #6C8EF5;
    --primary-light:    #9BB3FA;
    --line:             rgba(255,255,255,0.08);
    --error:            #FFB4AB;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    max-width: 390px;
    margin: 0 auto;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .status-bar {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 22px;
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
  }

  /* ── Hero gradient (dark) ── */
  .hero {
    background: linear-gradient(160deg, #1A1F2E 0%, #1E2540 70%, #252C40 100%);
    padding: 14px 20px 28px;
    position: relative;
    overflow: hidden;
  }
  /* 装飾 blur 円 — 透明度を大きく落として Slate Blue glow を抑える */
  .hero-blur {
    position: absolute;
    right: -50px;
    top: -50px;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    filter: blur(40px);
    pointer-events: none;
  }

  .hero-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
    position: relative;
    z-index: 1;
  }
  /* ★ FOCAL: avatar (identity の中心) */
  .avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter Tight', sans-serif;
    font-size: 26px;
    font-weight: 900;
    color: #FFFFFF;
    box-shadow: 0 4px 16px rgba(0,0,0,.35);
  }
  .hero-name {
    font-family: 'Inter Tight', sans-serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -.02em;
    margin-bottom: 2px;
    color: #FFFFFF;
  }
  .hero-sub {
    font-size: 14px;
    color: var(--text-2);
    font-weight: 500;
  }
  /* ★ FOCAL: ログイン CTA */
  .login-cta {
    margin-top: 8px;
    padding: 6px 16px;
    background: var(--primary);
    color: #FFFFFF;
    border: none;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }

  /* level row */
  .level-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }
  .level-label {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-2);
    letter-spacing: .12em;
    text-transform: uppercase;
  }
  .level-num {
    font-family: 'Inter Tight', sans-serif;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: -.02em;
    color: #FFFFFF;
  }
  .level-track {
    height: 12px;
    background: rgba(255,255,255,.10);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }
  /* ★ FOCAL: progress fill */
  .level-fill {
    height: 100%;
    width: 42%;
    background: var(--primary);
    border-radius: 99px;
  }
  .level-meta {
    font-size: 14px;
    color: var(--text-2);
    font-weight: 500;
    text-align: right;
    position: relative;
    z-index: 1;
  }

  /* ── Stats grid (3 列, neutral) ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: -32px;
    position: relative;
    z-index: 2;
    padding: 0 20px;
  }
  /* stat tile — 青 glow を排除し黒系 shadow に */
  .stat-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 14px 8px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,.30);
  }
  .stat-val {
    font-family: 'Inter Tight', sans-serif;
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -.02em;
    color: var(--text);
    margin-bottom: 4px;
  }
  .stat-label {
    font-size: 11px;
    color: var(--text-2);
    font-weight: 600;
  }

  /* ── Body content ── */
  .content {
    padding: 16px 16px 100px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ── 今週サマリー ── */
  .summary-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 1px 0 rgba(0,0,0,.35);
  }
  .summary-title {
    font-size: 14px;
    color: #FFFFFF;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .summary-bars {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 70px;
    margin-bottom: 8px;
  }
  .bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .bar {
    width: 100%;
    height: 20%;
    min-height: 8px;
    background: var(--surface-low);
    border-radius: 5px;
  }
  /* studied bar — focal なので Slate Blue を残す（学習した日の indicator） */
  .bar.studied {
    height: 100%;
    background: var(--primary);
  }
  .bar-day {
    font-size: 14px;
    color: var(--text-2);
    font-weight: 500;
  }

  /* ── 実力診断テスト row (neutral) ── */
  .placement-row {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  /* アイコン下地 — neutral (青 tint を抜く) */
  .placement-icon {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: var(--surface-high);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-2);
    flex-shrink: 0;
  }
  .placement-name {
    font-size: 14px;
    font-weight: 700;
    color: #FFFFFF;
  }
  .placement-sub {
    font-size: 13px;
    color: var(--text-2);
    margin-top: 2px;
  }
  .placement-arrow {
    color: var(--text-3);
  }

  /* ── 設定リスト (neutral) ── */
  .settings {
    background: var(--surface);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 1px 0 rgba(0,0,0,.35);
  }
  .setting-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
  }
  .setting-row:last-child { border-bottom: none; }
  .setting-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--surface-high);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-2);
    flex-shrink: 0;
  }
  .setting-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .setting-sub {
    font-size: 12px;
    color: var(--text-2);
    margin-top: 2px;
  }
  .setting-arrow { color: var(--text-3); margin-left: auto; }

  /* ── ログアウト button ── */
  .logout {
    background: transparent;
    border: 1px solid rgba(252,165,165,.4);
    border-radius: 14px;
    padding: 13px;
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--error);
    cursor: pointer;
    width: 100%;
  }

  /* ── tab bar ── */
  .tabbar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 390px;
    background: rgba(26, 31, 46, 0.92);
    backdrop-filter: saturate(180%) blur(20px);
    border-top: 1px solid var(--line);
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    padding: 8px 0 calc(env(safe-area-inset-bottom, 0px) + 6px);
  }
  .tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 4px 0;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-2);
  }
  .tab.active { color: var(--primary); }
  .tab svg { stroke: currentColor; }
</style>
</head>
<body>

<div class="status-bar">
  <span>4:57</span>
  <span style="display:flex;gap:6px;align-items:center;font-size:12px;">4G<span style="display:inline-block;width:18px;height:10px;border:1px solid var(--text-2);border-radius:3px;position:relative;"><span style="position:absolute;left:1px;top:1px;bottom:1px;width:80%;background:var(--text-2);border-radius:1px;"></span></span> 95%</span>
</div>

<!-- Hero -->
<div class="hero">
  <div class="hero-blur"></div>
  <div class="hero-row">
    <!-- ★ FOCAL avatar -->
    <div class="avatar">G</div>
    <div style="flex:1;">
      <div class="hero-name">ゲスト</div>
      <div class="hero-sub">ログインすると進捗が保存されるよ</div>
      <button class="login-cta">ログイン / 新規登録</button>
    </div>
  </div>
  <div class="level-row">
    <span class="level-label">レベル</span>
    <span class="level-num">Lv.4</span>
  </div>
  <div class="level-track">
    <!-- ★ FOCAL progress fill -->
    <div class="level-fill"></div>
  </div>
  <div class="level-meta">次のLvまで 420 XP</div>
</div>

<!-- Stats grid (neutral) -->
<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-val">7</div>
    <div class="stat-label">連続学習日数</div>
  </div>
  <div class="stat-card">
    <div class="stat-val">14</div>
    <div class="stat-label">完了レッスン</div>
  </div>
  <div class="stat-card">
    <div class="stat-val">1,420</div>
    <div class="stat-label">総XP</div>
  </div>
</div>

<div class="content">

  <!-- 今週サマリー -->
  <div class="summary-card">
    <div class="summary-title">今週の学習サマリー</div>
    <div class="summary-bars">
      <div class="bar-col"><div class="bar studied"></div><span class="bar-day">月</span></div>
      <div class="bar-col"><div class="bar studied"></div><span class="bar-day">火</span></div>
      <div class="bar-col"><div class="bar studied"></div><span class="bar-day">水</span></div>
      <div class="bar-col"><div class="bar studied"></div><span class="bar-day">木</span></div>
      <div class="bar-col"><div class="bar studied"></div><span class="bar-day">金</span></div>
      <div class="bar-col"><div class="bar"></div><span class="bar-day">土</span></div>
      <div class="bar-col"><div class="bar"></div><span class="bar-day">日</span></div>
    </div>
  </div>

  <!-- 実力診断テスト row (neutral) -->
  <div class="placement-row">
    <div class="placement-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    </div>
    <div style="flex:1;">
      <div class="placement-name">実力診断テスト</div>
      <div class="placement-sub">5軸スキル診断で最適なコースを見つけよう</div>
    </div>
    <svg class="placement-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="9 18 15 12 9 6" /></svg>
  </div>

  <!-- 設定 -->
  <div class="settings">
    <div class="setting-row">
      <div class="setting-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.42 3.58-8 8-8s8 3.58 8 8"/></svg></div>
      <div style="flex:1;"><div class="setting-name">アカウント</div><div class="setting-sub">ゲスト</div></div>
      <span class="setting-arrow">›</span>
    </div>
    <div class="setting-row">
      <div class="setting-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg></div>
      <div style="flex:1;"><div class="setting-name">通知設定</div></div>
      <span class="setting-arrow">›</span>
    </div>
    <div class="setting-row">
      <div class="setting-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>
      <div style="flex:1;"><div class="setting-name">プラン</div><div class="setting-sub">無料プラン</div></div>
      <span class="setting-arrow">›</span>
    </div>
    <div class="setting-row">
      <div class="setting-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
      <div style="flex:1;"><div class="setting-name">フィードバック</div><div class="setting-sub">ご意見をお聞かせください</div></div>
      <span class="setting-arrow">›</span>
    </div>
  </div>

  <button class="logout">ログアウト</button>

</div>

<div class="tabbar">
  <div class="tab">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7h-6v7H4a1 1 0 0 1-1-1V9.5z"/></svg>
    ホーム
  </div>
  <div class="tab">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20a15 15 0 0 1 0-20"/></svg>
    ロードマップ
  </div>
  <div class="tab">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7v10l10 5 10-5V7l-10-5z"/></svg>
    ランク
  </div>
  <div class="tab">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12c0 4.97-4.03 9-9 9s-9-4.03-9-9 4.03-9 9-9 9 4.03 9 9z"/><path d="M9 9.5c.5-1.5 1.5-2.5 3-2.5"/></svg>
    ヘルプ
  </div>
  <div class="tab active">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.42 3.58-8 8-8s8 3.58 8 8"/></svg>
    プロフィール
  </div>
</div>

</body>
</html>
