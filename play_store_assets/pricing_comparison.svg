<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#0f0f15"/>
  
  <!-- Title -->
  <text x="600" y="60" font-size="48" font-weight="700" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif">
    Logic プランを選ぶ
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="110" font-size="20" text-anchor="middle" fill="#999999" font-family="'Inter', sans-serif">
    あなたの学習スタイルに合ったプランを選択
  </text>
  
  <!-- ===== FREE PLAN ===== -->
  <g id="free-plan">
    <!-- Card Background -->
    <rect x="50" y="180" width="300" height="550" rx="20" fill="#1a1f2e" stroke="#333333" stroke-width="2"/>
    
    <!-- Plan Name -->
    <text x="200" y="240" font-size="28" font-weight="700" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif">
      フリー
    </text>
    
    <!-- Price -->
    <text x="200" y="290" font-size="18" text-anchor="middle" fill="#999999" font-family="'Inter', sans-serif">
      永久無料
    </text>
    
    <!-- Features -->
    <text x="80" y="360" font-size="14" fill="#cccccc" font-family="'Inter', sans-serif">
      デイリーフェルミ 1問/日
    </text>
    <text x="80" y="400" font-size="14" fill="#cccccc" font-family="'Inter', sans-serif">
      基本レッスン 5コース
    </text>
    <text x="80" y="440" font-size="14" fill="#cccccc" font-family="'Inter', sans-serif">
      広告あり
    </text>
    
    <!-- Button -->
    <rect x="80" y="500" width="240" height="50" rx="12" fill="#333333" stroke="#555555" stroke-width="1"/>
    <text x="200" y="535" font-size="16" font-weight="600" text-anchor="middle" fill="#999999" font-family="'Inter', sans-serif">
      今すぐはじめる
    </text>
  </g>
  
  <!-- ===== STANDARD MONTHLY ===== -->
  <g id="standard-monthly">
    <!-- Card Background -->
    <rect x="450" y="180" width="300" height="550" rx="20" fill="#1a1f2e" stroke="#6c8ef5" stroke-width="2"/>
    
    <!-- Plan Name -->
    <text x="600" y="240" font-size="28" font-weight="700" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif">
      スタンダード
    </text>
    <text x="600" y="270" font-size="14" text-anchor="middle" fill="#999999" font-family="'Inter', sans-serif">
      月額
    </text>
    
    <!-- Price -->
    <text x="600" y="320" font-size="40" font-weight="700" text-anchor="middle" fill="#6c8ef5" font-family="'Inter', sans-serif">
      390
    </text>
    <text x="600" y="340" font-size="14" text-anchor="middle" fill="#999999" font-family="'Inter', sans-serif">
      円/月
    </text>
    
    <!-- Trial -->
    <text x="600" y="375" font-size="13" text-anchor="middle" fill="#aaaaaa" font-family="'Inter', sans-serif">
      7日間無料トライアル
    </text>
    
    <!-- Features -->
    <text x="480" y="430" font-size="14" fill="#cccccc" font-family="'Inter', sans-serif">
      AI問題生成 月300問
    </text>
    <text x="480" y="470" font-size="14" fill="#cccccc" font-family="'Inter', sans-serif">
      全レッスン 40コース
    </text>
    <text x="480" y="510" font-size="14" fill="#cccccc" font-family="'Inter', sans-serif">
      ランキング機能
    </text>
    <text x="480" y="550" font-size="14" fill="#cccccc" font-family="'Inter', sans-serif">
      広告なし
    </text>
    
    <!-- Button -->
    <rect x="480" y="590" width="240" height="50" rx="12" fill="#6c8ef5"/>
    <text x="600" y="625" font-size="16" font-weight="600" text-anchor="middle" fill="#082121" font-family="'Inter', sans-serif">
      月額プランを選ぶ
    </text>
  </g>
  
  <!-- ===== STANDARD YEARLY ===== -->
  <g id="standard-yearly">
    <!-- Card Background -->
    <rect x="850" y="180" width="300" height="550" rx="20" fill="#1a1f2e" stroke="#4caf50" stroke-width="2"/>
    
    <!-- Badge: Recommended -->
    <rect x="920" y="200" width="160" height="30" rx="8" fill="#4caf50"/>
    <text x="1000" y="220" font-size="12" font-weight="700" text-anchor="middle" fill="#082121" font-family="'Inter', sans-serif">
      最もお得
    </text>
    
    <!-- Plan Name -->
    <text x="1000" y="270" font-size="28" font-weight="700" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif">
      スタンダード
    </text>
    <text x="1000" y="300" font-size="14" text-anchor="middle" fill="#999999" font-family="'Inter', sans-serif">
      年額
    </text>
    
    <!-- Price -->
    <text x="1000" y="350" font-size="40" font-weight="700" text-anchor="middle" fill="#4caf50" font-family="'Inter', sans-serif">
      2,730
    </text>
    <text x="1000" y="370" font-size="14" text-anchor="middle" fill="#999999" font-family="'Inter', sans-serif">
      円/年
    </text>
    
    <!-- Monthly Equiv -->
    <text x="1000" y="405" font-size="13" text-anchor="middle" fill="#aaaaaa" font-family="'Inter', sans-serif">
      月々 228円相当
    </text>
    
    <!-- Trial -->
    <text x="1000" y="435" font-size="13" text-anchor="middle" fill="#aaaaaa" font-family="'Inter', sans-serif">
      7日間無料トライアル
    </text>
    
    <!-- Features -->
    <text x="880" y="490" font-size="14" fill="#cccccc" font-family="'Inter', sans-serif">
      AI問題生成 月300問
    </text>
    <text x="880" y="530" font-size="14" fill="#cccccc" font-family="'Inter', sans-serif">
      全レッスン 40コース
    </text>
    <text x="880" y="570" font-size="14" fill="#cccccc" font-family="'Inter', sans-serif">
      ランキング機能
    </text>
    <text x="880" y="610" font-size="14" fill="#cccccc" font-family="'Inter', sans-serif">
      広告なし
    </text>
    
    <!-- Button -->
    <rect x="880" y="650" width="240" height="50" rx="12" fill="#4caf50"/>
    <text x="1000" y="685" font-size="16" font-weight="600" text-anchor="middle" fill="#082121" font-family="'Inter', sans-serif">
      年額プランを選ぶ
    </text>
  </g>
  
  <!-- Footer Note -->
  <text x="600" y="780" font-size="12" text-anchor="middle" fill="#666666" font-family="'Inter', sans-serif">
    すべてのプランに7日間の無料トライアルが付属しています。いつでもキャンセルできます。
  </text>
</svg>
