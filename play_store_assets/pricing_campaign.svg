<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#0f0f15"/>
  
  <!-- Title -->
  <text x="600" y="60" font-size="48" font-weight="700" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif">
    Logic プランを選ぶ
  </text>
  
  <!-- Campaign Banner -->
  <rect x="200" y="100" width="800" height="60" rx="12" fill="#ff6b6b" opacity="0.15" stroke="#ff6b6b" stroke-width="2"/>
  <text x="600" y="140" font-size="18" font-weight="700" text-anchor="middle" fill="#ff6b6b" font-family="'Inter', sans-serif">
    期間限定キャンペーン: 年額 1,980円 で最大 30% OFF
  </text>
  
  <!-- ===== FREE PLAN ===== -->
  <g id="free-plan">
    <!-- Card Background -->
    <rect x="50" y="220" width="300" height="500" rx="20" fill="#1a1f2e" stroke="#333333" stroke-width="2"/>
    
    <!-- Plan Name -->
    <text x="200" y="280" font-size="28" font-weight="700" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif">
      フリー
    </text>
    
    <!-- Price -->
    <text x="200" y="330" font-size="18" text-anchor="middle" fill="#999999" font-family="'Inter', sans-serif">
      永久無料
    </text>
    
    <!-- Features -->
    <text x="80" y="400" font-size="14" fill="#cccccc" font-family="'Inter', sans-serif">
      デイリーフェルミ 1問/日
    </text>
    <text x="80" y="440" font-size="14" fill="#cccccc" font-family="'Inter', sans-serif">
      基本レッスン 5コース
    </text>
    <text x="80" y="480" font-size="14" fill="#cccccc" font-family="'Inter', sans-serif">
      広告あり
    </text>
    
    <!-- Button -->
    <rect x="80" y="540" width="240" height="50" rx="12" fill="#333333" stroke="#555555" stroke-width="1"/>
    <text x="200" y="575" font-size="16" font-weight="600" text-anchor="middle" fill="#999999" font-family="'Inter', sans-serif">
      今すぐはじめる
    </text>
  </g>
  
  <!-- ===== CAMPAIGN YEARLY ===== -->
  <g id="campaign-yearly">
    <!-- Card Background -->
    <rect x="450" y="220" width="300" height="500" rx="20" fill="#1a1f2e" stroke="#ff6b6b" stroke-width="3"/>
    
    <!-- Badge: Campaign -->
    <rect x="520" y="240" width="160" height="30" rx="8" fill="#ff6b6b"/>
    <text x="600" y="260" font-size="12" font-weight="700" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif">
      期間限定
    </text>
    
    <!-- Plan Name -->
    <text x="600" y="310" font-size="28" font-weight="700" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif">
      キャンペーン
    </text>
    <text x="600" y="340" font-size="14" text-anchor="middle" fill="#999999" font-family="'Inter', sans-serif">
      年額
    </text>
    
    <!-- Price -->
    <text x="600" y="390" font-size="40" font-weight="700" text-anchor="middle" fill="#ff6b6b" font-family="'Inter', sans-serif">
      1,980
    </text>
    <text x="600" y="410" font-size="14" text-anchor="middle" fill="#999999" font-family="'Inter', sans-serif">
      円/年
    </text>
    
    <!-- Trial -->
    <text x="600" y="445" font-size="13" text-anchor="middle" fill="#aaaaaa" font-family="'Inter', sans-serif">
      7日間無料トライアル
    </text>
    
    <!-- Features -->
    <text x="480" y="500" font-size="14" fill="#cccccc" font-family="'Inter', sans-serif">
      AI問題生成 月300問
    </text>
    <text x="480" y="540" font-size="14" fill="#cccccc" font-family="'Inter', sans-serif">
      全レッスン 40コース
    </text>
    <text x="480" y="580" font-size="14" fill="#cccccc" font-family="'Inter', sans-serif">
      ランキング機能
    </text>
    <text x="480" y="620" font-size="14" fill="#cccccc" font-family="'Inter', sans-serif">
      広告なし
    </text>
    
    <!-- Button -->
    <rect x="480" y="660" width="240" height="50" rx="12" fill="#ff6b6b"/>
    <text x="600" y="695" font-size="16" font-weight="600" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif">
      キャンペーンプランを選ぶ
    </text>
  </g>
  
  <!-- ===== STANDARD YEARLY (Reference) ===== -->
  <g id="standard-yearly">
    <!-- Card Background -->
    <rect x="850" y="220" width="300" height="500" rx="20" fill="#1a1f2e" stroke="#333333" stroke-width="2"/>
    
    <!-- Plan Name -->
    <text x="1000" y="280" font-size="28" font-weight="700" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif">
      スタンダード
    </text>
    <text x="1000" y="310" font-size="14" text-anchor="middle" fill="#999999" font-family="'Inter', sans-serif">
      年額
    </text>
    
    <!-- Price -->
    <text x="1000" y="360" font-size="40" font-weight="700" text-anchor="middle" fill="#999999" font-family="'Inter', sans-serif">
      2,730
    </text>
    <text x="1000" y="380" font-size="14" text-anchor="middle" fill="#999999" font-family="'Inter', sans-serif">
      円/年
    </text>
    
    <!-- Trial -->
    <text x="1000" y="415" font-size="13" text-anchor="middle" fill="#aaaaaa" font-family="'Inter', sans-serif">
      7日間無料トライアル
    </text>
    
    <!-- Features -->
    <text x="880" y="470" font-size="14" fill="#cccccc" font-family="'Inter', sans-serif">
      AI問題生成 月300問
    </text>
    <text x="880" y="510" font-size="14" fill="#cccccc" font-family="'Inter', sans-serif">
      全レッスン 40コース
    </text>
    <text x="880" y="550" font-size="14" fill="#cccccc" font-family="'Inter', sans-serif">
      ランキング機能
    </text>
    <text x="880" y="590" font-size="14" fill="#cccccc" font-family="'Inter', sans-serif">
      広告なし
    </text>
    
    <!-- Button -->
    <rect x="880" y="630" width="240" height="50" rx="12" fill="#333333" stroke="#555555" stroke-width="1"/>
    <text x="1000" y="665" font-size="16" font-weight="600" text-anchor="middle" fill="#999999" font-family="'Inter', sans-serif">
      スタンダードプラン
    </text>
  </g>
  
  <!-- Footer Note -->
  <text x="600" y="780" font-size="12" text-anchor="middle" fill="#666666" font-family="'Inter', sans-serif">
    キャンペーンは 2026年5月1日～5月31日の期間限定です。
  </text>
</svg>
