<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-e1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2942"/>
      <stop offset="100%" stop-color="#101729"/>
    </linearGradient>
    <radialGradient id="glow-e1" cx="0.7" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#6C8EF5" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#6C8EF5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rob-e1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A6BD6"/>
      <stop offset="100%" stop-color="#2A3B7A"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="400" fill="url(#bg-e1)"/>

  <!-- 細かいグリッド（秩序・礼） -->
  <g stroke="#2A3656" stroke-width="1" opacity="0.35">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
  </g>

  <!-- グロー -->
  <circle cx="560" cy="180" r="220" fill="url(#glow-e1)"/>

  <!-- 都市シルエット（社会・組織） -->
  <g fill="#1A2540" opacity="0.85">
    <rect x="0" y="320" width="60" height="80"/>
    <rect x="60" y="300" width="40" height="100"/>
    <rect x="100" y="330" width="50" height="70"/>
    <polygon points="150,330 175,310 200,330 200,400 150,400"/>
    <rect x="200" y="305" width="30" height="95"/>
    <rect x="710" y="320" width="40" height="80"/>
    <rect x="750" y="300" width="50" height="100"/>
  </g>

  <!-- 賢者（孔子的） — 静かに座る人物 -->
  <g transform="translate(160,180)">
    <!-- 衣（ローブ） -->
    <path d="M -45 80 Q -50 30 -30 0 Q -10 -10 0 -10 Q 10 -10 30 0 Q 50 30 45 80 Z" fill="url(#rob-e1)"/>
    <!-- 袖の重なり -->
    <path d="M -45 80 Q -55 50 -40 30" fill="none" stroke="#6C8EF5" stroke-width="2" opacity="0.6"/>
    <path d="M 45 80 Q 55 50 40 30" fill="none" stroke="#6C8EF5" stroke-width="2" opacity="0.6"/>
    <!-- 顔 -->
    <circle cx="0" cy="-22" r="14" fill="#E7ECF7"/>
    <!-- 髪・冠 -->
    <path d="M -14 -28 Q 0 -42 14 -28 L 14 -22 L -14 -22 Z" fill="#1A2540"/>
    <!-- 足元 -->
    <ellipse cx="0" cy="84" rx="48" ry="6" fill="#0E1424" opacity="0.7"/>
  </g>

  <!-- 巻物（書） -->
  <g transform="translate(290,280)">
    <rect x="0" y="0" width="90" height="22" rx="11" fill="#E7ECF7" opacity="0.95"/>
    <line x1="14" y1="11" x2="76" y2="11" stroke="#4A6BD6" stroke-width="1.5" opacity="0.7"/>
    <circle cx="6" cy="11" r="3" fill="#1F2942"/>
    <circle cx="84" cy="11" r="3" fill="#1F2942"/>
  </g>

  <!-- 関係性ネットワーク（仁・人と人の繋がり） -->
  <g>
    <!-- ノード（人） -->
    <circle cx="500" cy="140" r="14" fill="url(#rob-e1)" stroke="#7AAEFF" stroke-width="2"/>
    <circle cx="620" cy="100" r="11" fill="#6C8EF5" stroke="#FFFFFF" stroke-width="1.5" opacity="0.85"/>
    <circle cx="680" cy="180" r="11" fill="#6C8EF5" stroke="#FFFFFF" stroke-width="1.5" opacity="0.85"/>
    <circle cx="600" cy="240" r="11" fill="#6C8EF5" stroke="#FFFFFF" stroke-width="1.5" opacity="0.85"/>
    <circle cx="480" cy="240" r="11" fill="#6C8EF5" stroke="#FFFFFF" stroke-width="1.5" opacity="0.85"/>
    <circle cx="430" cy="160" r="9" fill="#7AAEFF" opacity="0.85"/>
    <!-- リンク -->
    <g stroke="#6C8EF5" stroke-width="1.6" opacity="0.55">
      <line x1="500" y1="140" x2="620" y2="100"/>
      <line x1="500" y1="140" x2="680" y2="180"/>
      <line x1="500" y1="140" x2="600" y2="240"/>
      <line x1="500" y1="140" x2="480" y2="240"/>
      <line x1="500" y1="140" x2="430" y2="160"/>
      <line x1="620" y1="100" x2="680" y2="180"/>
      <line x1="600" y1="240" x2="680" y2="180"/>
      <line x1="480" y1="240" x2="600" y2="240"/>
    </g>
  </g>

  <!-- 漢字「仁」（淡く） -->
  <g transform="translate(560,290)" opacity="0.18">
    <text x="0" y="0" font-family="serif" font-size="120" font-weight="700" fill="#FFFFFF">仁</text>
  </g>

  <!-- 月／印章（アクセント） -->
  <g transform="translate(720,80)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#FFD566" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="0" r="14" fill="#FFD566" opacity="0.18"/>
  </g>

  <!-- 小さな星（点） -->
  <g fill="#7AAEFF" opacity="0.7">
    <circle cx="380" cy="60" r="2"/>
    <circle cx="450" cy="40" r="1.5"/>
    <circle cx="540" cy="50" r="2"/>
    <circle cx="660" cy="40" r="1.5"/>
    <circle cx="120" cy="60" r="1.5"/>
    <circle cx="240" cy="80" r="2"/>
  </g>
</svg>
