<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2942"/>
      <stop offset="100%" stop-color="#101729"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#4A6BD6"/>
      <stop offset="100%" stop-color="#6C8EF5"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#3B5BBF"/>
      <stop offset="100%" stop-color="#7AAEFF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#6C8EF5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6C8EF5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- 背景グリッド（戦略マップ感） -->
  <g stroke="#2A3656" stroke-width="1" opacity="0.45">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
  </g>

  <!-- グロー -->
  <circle cx="600" cy="200" r="240" fill="url(#glow)"/>

  <!-- 階段状の3本柱（戦略の進化: 古典→競争→ネットワーク） -->
  <g>
    <rect x="120" y="240" width="80" height="120" rx="6" fill="url(#bar)" opacity="0.85"/>
    <rect x="220" y="180" width="80" height="180" rx="6" fill="url(#bar)" opacity="0.92"/>
    <rect x="320" y="120" width="80" height="240" rx="6" fill="url(#bar)"/>
  </g>

  <!-- 上昇矢印（進化の方向） -->
  <g stroke="#FFFFFF" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <polyline points="140,210 250,150 360,90"/>
    <polyline points="335,90 360,90 360,115"/>
  </g>

  <!-- 右側: ネットワーク（プラットフォーム/エコシステム） -->
  <g>
    <!-- ハブ -->
    <circle cx="600" cy="200" r="28" fill="url(#bar2)"/>
    <circle cx="600" cy="200" r="28" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.7"/>
    <!-- ノード -->
    <circle cx="500" cy="120" r="12" fill="#6C8EF5"/>
    <circle cx="700" cy="120" r="12" fill="#6C8EF5"/>
    <circle cx="500" cy="280" r="12" fill="#6C8EF5"/>
    <circle cx="700" cy="280" r="12" fill="#6C8EF5"/>
    <circle cx="600" cy="80" r="10" fill="#7AAEFF"/>
    <circle cx="600" cy="320" r="10" fill="#7AAEFF"/>
    <!-- リンク -->
    <g stroke="#6C8EF5" stroke-width="2" opacity="0.55">
      <line x1="600" y1="200" x2="500" y2="120"/>
      <line x1="600" y1="200" x2="700" y2="120"/>
      <line x1="600" y1="200" x2="500" y2="280"/>
      <line x1="600" y1="200" x2="700" y2="280"/>
      <line x1="600" y1="200" x2="600" y2="80"/>
      <line x1="600" y1="200" x2="600" y2="320"/>
    </g>
  </g>

  <!-- アクセント: 王冠/星（戦略の優位） -->
  <g transform="translate(360,76)" fill="#FFD566">
    <polygon points="0,-14 4,-4 14,-4 6,2 9,12 0,6 -9,12 -6,2 -14,-4 -4,-4"/>
  </g>
</svg>
