<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background: rounded square with subtle vertical gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8A674"/>
      <stop offset="1" stop-color="#C77B45"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Pyramid logic tree: 1 top node + 2 bottom nodes connected -->
  <!-- All white, generous spacing, centered -->
  <g fill="#FFFFFF" stroke="#FFFFFF" stroke-linecap="round">
    <!-- Connecting lines (drawn first so dots overlap them cleanly) -->
    <line x1="512" y1="370" x2="354" y2="640" stroke-width="48"/>
    <line x1="512" y1="370" x2="670" y2="640" stroke-width="48"/>

    <!-- Top dot (conclusion) -->
    <circle cx="512" cy="370" r="92"/>
    <!-- Bottom-left dot -->
    <circle cx="354" cy="654" r="92"/>
    <!-- Bottom-right dot -->
    <circle cx="670" cy="654" r="92"/>
  </g>
</svg>
