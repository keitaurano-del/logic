name: Build Android AAB

# Play Console にアップロードする AAB を生成するワークフロー
# 手動トリガー (workflow_dispatch) または claude/create-aab-file-* ブランチへのプッシュで起動
# 完成した AAB は Actions の Artifacts からダウンロード可能

on:
  workflow_dispatch:
  push:
    branches:
      - 'claude/create-aab-file-**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm ci

      - name: Build web assets (Vite)
        run: npm run build

      - name: Sync Capacitor to Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build signed AAB
        working-directory: android
        env:
          LOGIC_KEYSTORE_PATH: ${{ github.workspace }}/keystores/logic-release.keystore
          LOGIC_KEYSTORE_PASSWORD: ${{ secrets.LOGIC_KEYSTORE_PASSWORD || 'LogicApp2026Release' }}
          LOGIC_KEY_ALIAS: ${{ secrets.LOGIC_KEY_ALIAS || 'logic' }}
          LOGIC_KEY_PASSWORD: ${{ secrets.LOGIC_KEY_PASSWORD || 'LogicApp2026Release' }}
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Locate AAB
        id: locate
        run: |
          AAB_PATH=$(find android/app/build/outputs/bundle/release -name "*.aab" | head -1)
          if [ -z "$AAB_PATH" ]; then
            echo "AAB not found"
            exit 1
          fi
          echo "aab_path=$AAB_PATH" >> "$GITHUB_OUTPUT"
          ls -la "$AAB_PATH"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: logic-release-aab
          path: ${{ steps.locate.outputs.aab_path }}
          retention-days: 30
          if-no-files-found: error
