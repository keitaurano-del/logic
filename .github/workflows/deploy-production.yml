name: 🚀 Deploy to Production (Render)

on:
  # 手動トリガーのみ — mainへのpushでは自動実行しない
  workflow_dispatch:
    inputs:
      confirm:
        description: '本番デプロイを実行しますか？ (yes と入力)'
        required: true
        default: 'no'
      preview_checked:
        description: 'PR プレビュー (logic-pr-XXX.onrender.com) または SIT で確認済みですか？ (yes と入力)'
        required: true
        default: 'no'

jobs:
  # ── ガード: "yes" 以外は即終了 ─────────────────────────
  check-confirm:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "yes" ]; then
            echo "❌ 'yes' と入力されなかったためデプロイを中止します"
            exit 1
          fi
          if [ "${{ github.event.inputs.preview_checked }}" != "yes" ]; then
            echo "❌ プレビュー確認が未完了です。"
            echo "   PR を作成すると logic-pr-<番号>.onrender.com に自動で"
            echo "   プレビュー環境が立ち上がります。そこで動作確認してから再実行してください。"
            echo "   （または Deploy to SIT (Preview) ワークフローを使用）"
            exit 1
          fi
          echo "✅ 承認確認OK（プレビュー確認済み）"

  # ── ビルド確認 ─────────────────────────────────────────
  build:
    needs: check-confirm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

  # ── Render 本番デプロイ ────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://logic-u5wn.onrender.com
    steps:
      - name: Trigger Render production deploy
        run: |
          echo "🚀 Render 本番デプロイをトリガーします..."
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_PROD_SERVICE_ID }}/deploys")
          DEPLOY_ID=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('id','?'))")
          echo "Deploy ID: $DEPLOY_ID"

          # デプロイ完了まで待機（最大15分）
          for i in $(seq 1 30); do
            sleep 30
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/${{ secrets.RENDER_PROD_SERVICE_ID }}/deploys?limit=1" \
              | python3 -c "import json,sys; d=json.load(sys.stdin); print(d[0].get('deploy',d[0]).get('status',''))")
            echo "$(date '+%H:%M:%S') Status: $STATUS"
            if [ "$STATUS" = "live" ]; then
              echo "✅ 本番デプロイ完了！"
              echo "URL: https://logic-u5wn.onrender.com"
              exit 0
            elif [ "$STATUS" = "update_failed" ]; then
              echo "❌ デプロイ失敗"
              exit 1
            fi
          done
          echo "⚠️ タイムアウト（15分）"
          exit 1
