name: iOS → TestFlight (Beta)

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'ios/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ios-beta.yml'
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'TestFlight changelog (What to Test)'
        required: false
        default: 'Bug fixes and improvements.'

jobs:
  testflight:
    runs-on: macos-14
    timeout-minutes: 60

    env:
      APP_BUNDLE_ID: io.logic.app
      APPLE_ID: ${{ secrets.APPLE_ID }}
      DEVELOPER_TEAM_ID: ${{ secrets.DEVELOPER_TEAM_ID }}
      ITC_TEAM_ID: ${{ secrets.ITC_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      RELEASE_NOTES: ${{ github.event.inputs.release_notes || format('Build {0}', github.run_number) }}
      CI: true
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios/App

      - name: Install npm dependencies
        run: npm ci

      - name: Build web (Vite)
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: npm run build

      - name: Capacitor sync iOS
        run: npx cap sync ios

      - name: Run fastlane beta lane
        working-directory: ios/App
        run: bundle exec fastlane ios beta

      - name: Upload ipa artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Logic-ipa-${{ github.run_number }}
          path: ios/App/build/Logic.ipa
          retention-days: 14
          if-no-files-found: warn
