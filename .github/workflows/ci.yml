# Logic CI — TypeScript / Lint / Build verification on every PR
# 設計書: docs/HIG_MATERIAL_AUDIT_20260504.md §9, docs/QA_CHECKLIST_HIG_M3.md §0

name: CI — Build & Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript + Vite build
        run: npm run build
        env:
          # CI で必須でない API base はダミー値で OK (build 時に置換される)
          VITE_API_BASE: 'https://example.com'

      - name: ESLint (含む jsx-a11y)
        # PR #92 / #94 で error / warning ともに 0 達成済 → blocking に昇格。
        run: npm run lint

  a11y:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-and-lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run axe-core a11y tests
        # 初期投入時点では既存違反のスナップショット取得が目的のため non-blocking。
        # 実機検証 + 違反 0 達成後に continue-on-error を外して blocking に昇格する。
        run: npx playwright test e2e/a11y.spec.ts --project=chromium
        continue-on-error: true
        env:
          VITE_API_BASE: 'https://example.com'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-a11y-report
          path: e2e/report
          retention-days: 7
