# Logic CI — TypeScript / Lint / Build verification on every PR
# 設計書: docs/HIG_MATERIAL_AUDIT_20260504.md §9, docs/QA_CHECKLIST_HIG_M3.md §0

name: CI — Build & Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript + Vite build
        run: npm run build
        env:
          # CI で必須でない API base はダミー値で OK (build 時に置換される)
          VITE_API_BASE: 'https://example.com'

      - name: ESLint (含む jsx-a11y)
        # PR #92 / #94 で error / warning ともに 0 達成済 → blocking に昇格。
        run: npm run lint
