# Logic CI — TypeScript / Lint / Build verification on every PR
# 設計書: docs/HIG_MATERIAL_AUDIT_20260504.md §9, docs/QA_CHECKLIST_HIG_M3.md §0

name: CI — Build & Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript + Vite build
        run: npm run build
        env:
          # CI で必須でない API base はダミー値で OK (build 時に置換される)
          VITE_API_BASE: 'https://example.com'

      - name: ESLint (含む jsx-a11y)
        run: npm run lint
        # PR #92 / #94 で error / warning ともに 0 件達成。今後は blocking で維持する。

  # 自動アクセシビリティ検証（Phase 4-4）— axe-core を Playwright 経由で実行
  axe-a11y:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run axe a11y tests
        run: npx playwright test e2e/axe.spec.ts --project=chromium
        env:
          VITE_API_BASE: 'https://example.com'

      - name: Upload axe report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axe-report
          path: e2e/report
          retention-days: 14
