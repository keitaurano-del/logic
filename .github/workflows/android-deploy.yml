name: Android Deploy → Play Console (Internal Test)

on:
  push:
    branches: [main]
  workflow_dispatch:  # 手動トリガーも可能

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. チェックアウト ──────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js セットアップ ───────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Java (JDK 17) セットアップ ─────────────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Android SDK セットアップ ───────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. npm install ─────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 6. Web ビルド (Vite) ──────────────────────────────
      - name: Build web (Vite)
        run: npm run build
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}

      # ── 7. Capacitor: android/ ディレクトリを追加 ─────────
      #      初回のみ必要。android/ が既にある場合はスキップ
      - name: Add Android platform (if not exists)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      # ── 8. Capacitor Sync ─────────────────────────────────
      - name: Capacitor sync
        run: npx cap sync android

      # ── 9. versionCode を GITHUB_RUN_NUMBER で設定 ────────
      #      毎回ユニークなversionCodeを保証するためRUN_NUMBERを使用
      - name: Set Android versionCode from run number
        run: |
          GRADLE=android/app/build.gradle
          # RUN_NUMBER + 1000 でオフセット → Play Console の既存versionCodeと衝突しない
          VERSION_CODE=$(( ${{ github.run_number }} + 1000 ))
          # versionCode の行を置換
          sed -i "s/versionCode [0-9]*/versionCode ${VERSION_CODE}/" "$GRADLE"
          echo "✓ versionCode set to ${VERSION_CODE}"
          grep versionCode "$GRADLE"

      # ── 10. Gradle キャッシュ ─────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 11. キーストアをファイルに展開 + key.properties を生成 ───
      #     PR #28 で build.gradle が key.properties から署名情報を読む方式に
      #     変わったので、CI 側で key.properties を生成する。
      - name: Decode keystore and write key.properties
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/logic.keystore
          cat > android/key.properties << EOF
          LOGIC_KEYSTORE_FILE=logic.keystore
          LOGIC_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          LOGIC_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          LOGIC_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
          # 値が空でないか軽くチェック（base64 デコード後のバイト数）
          KSIZE=$(wc -c < android/app/logic.keystore)
          echo "logic.keystore size: $KSIZE bytes"
          if [ "$KSIZE" -lt 100 ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret may be empty or invalid"
            exit 1
          fi

      # ── 12. AAB ビルド ────────────────────────────────────
      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease --stacktrace

      # ── 13. AAB を成果物として保存 ───────────────────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── 14. Play Console 内部テストに配信 ────────────────
      - name: Deploy to Play Console (Internal Test)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: io.logic.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          inAppUpdatePriority: 2
