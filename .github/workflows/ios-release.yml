name: iOS → App Store (Submit for Review)

on:
  push:
    tags:
      - 'ios-v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Marketing version (e.g. 1.5.2). Leave blank to keep current.'
        required: false

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 90

    env:
      APP_BUNDLE_ID: io.logic.app
      APPLE_ID: ${{ secrets.APPLE_ID }}
      DEVELOPER_TEAM_ID: ${{ secrets.DEVELOPER_TEAM_ID }}
      ITC_TEAM_ID: ${{ secrets.ITC_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      CI: true
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios/App

      - name: Install npm dependencies
        run: npm ci

      - name: Build web (Vite)
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: npm run build

      - name: Capacitor sync iOS
        run: npx cap sync ios

      - name: Bump marketing version (if provided)
        if: ${{ github.event.inputs.version_name != '' }}
        working-directory: ios/App
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ github.event.inputs.version_name }}" App/Info.plist || true
          xcrun agvtool new-marketing-version ${{ github.event.inputs.version_name }}

      - name: Run fastlane release lane
        working-directory: ios/App
        run: bundle exec fastlane ios release

      - name: Upload ipa artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Logic-ipa-release-${{ github.run_number }}
          path: ios/App/build/Logic.ipa
          retention-days: 30
          if-no-files-found: warn
